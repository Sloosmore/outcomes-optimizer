name: Deploy agent-interceptor

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/SHA to deploy"
        required: false
        default: "main"
  push:
    branches: [main]
    paths:
      # Service source and config
      - 'services/agent-interceptor/src/**'
      - 'services/agent-interceptor/tsconfig.json'
      - 'services/agent-interceptor/wrangler.toml'
      - 'services/agent-interceptor/package.json'
      - 'services/agent-interceptor/package-lock.json'
      # Local file: dependencies (keep in sync with package.json file: deps)
      - 'services/doppler-secrets/src/**'
      - 'services/doppler-secrets/tsconfig.json'
      - 'services/doppler-secrets/package.json'
      - 'services/doppler-secrets/package-lock.json'

concurrency:
  group: deploy-agent-interceptor
  cancel-in-progress: true

permissions:
  contents: read

env:
  WORKER_URL: ${{ secrets.AGENT_INTERCEPTOR_WORKER_URL }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build doppler-secrets (local dep)
        run: npm ci && npm run build
        working-directory: services/doppler-secrets

      - name: Install dependencies
        run: npm ci
        working-directory: services/agent-interceptor

      - name: Run tests
        run: npm test
        working-directory: services/agent-interceptor

      - name: Deploy
        run: npm run deploy
        working-directory: services/agent-interceptor
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_AGENT_INTERCEPTOR_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$WORKER_URL/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Worker healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          echo "Smoke check failed after 3 attempts (last status: $STATUS)"
          exit 1
