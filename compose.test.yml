# Test compose file for environments where bind mounts from overlayfs don't work
# (e.g., nested containers). Uses named volumes populated via docker cp.
# Use: docker compose -f compose.test.yml run --rm <service>
#
# NOTE: Volume names (worktree-9b3bc58c, compose-shared-9b3bc58c) are intentionally
# hardcoded to match the worktree established by Story 2. Docker Compose does not
# support variable substitution in top-level volume declarations, so parameterization
# is not possible. For a fresh environment, re-run:
#   docker volume create worktree-9b3bc58c
#   docker volume create compose-shared-9b3bc58c

services:
  pnpm-install:
    image: node:22-alpine
    restart: "no"
    working_dir: /workspace
    volumes:
      - type: volume
        source: worktree-9b3bc58c
        target: /workspace
    entrypoint: ["sh", "/workspace/.docker/pnpm-install.sh"]
    command: []
    environment:
      - COREPACK_ENABLE_STRICT=0

  build-packages:
    image: node:22-alpine
    restart: "no"
    depends_on:
      pnpm-install:
        condition: service_completed_successfully
    working_dir: /workspace
    volumes:
      - type: volume
        source: worktree-9b3bc58c
        target: /workspace
    entrypoint: ["sh", "-c", "corepack enable pnpm && sh /workspace/.docker/build-packages.sh"]
    command: []
    environment:
      - COREPACK_ENABLE_STRICT=0

  database:
    profiles: [database]
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "0:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Long-running services (named volume variant) ────────────────────────────
  # These run from the workspace volume instead of bind mounts.
  # Required in nested Docker environments where bind mounts from overlayfs
  # don't work correctly.

  credential-proxy:
    image: node:22-alpine
    restart: "no"
    working_dir: /workspace/services/credential-proxy
    ports:
      - "0:3000"
    depends_on:
      build-packages:
        condition: service_completed_successfully
    volumes:
      - type: volume
        source: worktree-9b3bc58c
        target: /workspace
    entrypoint: ["sh", "-c", "apk add --no-cache curl >/dev/null 2>&1 && corepack enable pnpm && npx tsx src/index.ts"]
    command: []
    environment:
      - COREPACK_ENABLE_STRICT=0
      - DATABASE_URL
      - DOPPLER_TOKEN
      - DOPPLER_SERVICE_TOKEN
      - CREDENTIAL_PROXY_PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard-bff:
    profiles: [dashboard]
    image: node:22-alpine
    restart: "no"
    working_dir: /workspace/services/agent-livestream
    ports:
      - "0:3001"
    depends_on:
      build-packages:
        condition: service_completed_successfully
    volumes:
      - type: volume
        source: worktree-9b3bc58c
        target: /workspace
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache curl >/dev/null 2>&1
        corepack enable pnpm
        exec npx tsx server/adapters/node.ts
    command: []
    environment:
      - COREPACK_ENABLE_STRICT=0
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/postgres
      - ANTHROPIC_API_KEY
      - SUPABASE_URL
      - SUPABASE_SERVICE_KEY
      - VITE_SUPABASE_ANON_KEY
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  dashboard-vite:
    profiles: [dashboard]
    # Must match pnpm-install image (node:22-alpine/musl) so rollup native binaries
    # installed by pnpm are compatible. Aligns with services/agent-livestream/Dockerfile.
    image: node:22-alpine
    restart: "no"
    working_dir: /workspace/services/agent-livestream
    ports:
      - "0:5173"
    depends_on:
      build-packages:
        condition: service_completed_successfully
    volumes:
      - type: volume
        source: worktree-9b3bc58c
        target: /workspace
    entrypoint:
      - sh
      - -c
      - |
        npm run dev -- --port 5173 --host 0.0.0.0
    command: []
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

volumes:
  worktree-9b3bc58c:
    external: true
  compose-shared-9b3bc58c:
    external: true
